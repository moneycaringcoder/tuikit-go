name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r site/requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --config-file site/mkdocs.yml
