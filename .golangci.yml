version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - ineffassign
  disable:
    - depguard
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: examples/
        linters:
          - errcheck
  settings:
    gocritic:
      enabled-checks:
        - appendAssign
        - argOrder
        - badCall
        - badCond
        - dupArg
        - dupBranchBody
        - dupCase
        - dupSubExpr
        - flagDeref
        - nilValReturn
        - offBy1
        - sloppyReassign
        - weakCond
